# Contract for the demo `label` method:
#   inputs.data      <-> ctx.input("data")
#   outputs.labeled  <-> ctx.save_artifact("labeled", ...)
#   params.*         <-> ctx.params[...]  (threshold is required — the demo
#                        pipeline supplies 150, near the middle of the
#                        samples' intensity ranges)
inputs:
  data:
    type: .csv
    required: true
    description: "Quality-filtered cells from filter_cells"

outputs:
  labeled:
    type: .csv
    required: true
    description: "Input rows plus a label column (above/below the threshold)"

params:
  threshold:
    type: float
    required: true
    description: "Intensity cutoff; rows are labelled above/below it"
  label_column:
    type: str
    required: false
    default: "label"
    description: "Name of the added label column"

executor: local
env: container:__demo__env
