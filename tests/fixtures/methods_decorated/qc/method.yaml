# QC: summary histogram (PNG) + per-sample directory (PNG + CSV per subdir).
# Exercises directory-output + contents-pattern validation.
inputs:
  data:
    type: csv
    required: true
    description: "Rows to QC (needs 'value'; optionally a 'label' column)"

outputs:
  summary_plot:
    type: png
    required: true
    description: "Summary histogram of the value column"
  per_sample:
    type: directory
    required: true
    description: "One subdirectory per label group; each contains stats.csv + hist.png"
    contents:
      - pattern: "*/stats.csv"
        min_count: 1
      - pattern: "*/hist.png"
        min_count: 1

params:
  min_rows:
    type: int
    required: false
    default: 1
    description: "pass_count metric = 1 iff clean rows >= min_rows"
    constraints:
      min: 0

executor: python
env: inherit
