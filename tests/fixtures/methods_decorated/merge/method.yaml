# Fan-in concatenation of multiple CSVs (decorated form).
inputs:
  sources:
    type: csv
    required: true
    multiple: true
    description: "Two or more CSVs to concatenate (must share columns)"
    columns:
      strict:
        - id
        - value

outputs:
  merged:
    type: csv
    required: true
    description: "Concatenated rows from all sources"
    columns:
      strict:
        - id
        - value

params: {}

executor: python
env: inherit
