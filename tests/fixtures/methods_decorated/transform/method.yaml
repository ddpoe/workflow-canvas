# Transform: add a computed column. Emits CSV + JSON log (decorated form).
inputs:
  data:
    type: csv
    required: true
    description: "Input CSV to transform"

outputs:
  output:
    type: csv
    required: true
    description: "Input rows with a computed column appended"
  transform_log:
    type: json
    required: true
    description: "Per-row transform log (input id → new value)"

params:
  suffix:
    type: str
    required: false
    default: "_transformed"
    description: "Suffix appended to the new column name"

executor: python
env: inherit
