# Root of the imaging demo pipeline.
# Reads the sample CSV (through input_selector), tags rows, writes config.csv.
inputs:
  manifest:
    type: .csv
    required: true
    description: "Sample manifest CSV (one per input_selector output)"

outputs:
  config:
    type: .csv
    required: true
    description: "Stage-tagged config CSV"

executor: python
env: container:fixture-env
