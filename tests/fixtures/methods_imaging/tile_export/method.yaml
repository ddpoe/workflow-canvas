# 1-hop from build_config: reads config, writes tiles.
inputs:
  config:
    type: .csv
    required: true

outputs:
  tiles:
    type: .csv
    required: true

params:
  tile_size:
    type: int
    required: false
    default: 256
    description: "Tile edge length (px) for the synthetic tiling metric"
  overlap:
    type: float
    required: false
    default: 0.1
    description: "Fractional overlap between adjacent tiles"

executor: python
env: container:fixture-env
