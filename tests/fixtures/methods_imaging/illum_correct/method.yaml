# 2-hop from build_config: reads tiles, writes corrected.
inputs:
  tiles:
    type: .csv
    required: true

outputs:
  corrected:
    type: .csv
    required: true

params:
  sigma:
    type: float
    required: false
    default: 2.0
    description: "Gaussian sigma for the illumination-correction metric"

executor: python
env: container:fixture-env
