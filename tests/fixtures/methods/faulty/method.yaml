# tests/fixtures/methods/faulty/method.yaml
# Configurable failure method for testing error handling.
# Same input/output contract as transform so it can be swapped in.
inputs:
  data:
    type: csv
    required: true
    description: "Input CSV (may not be used depending on failure mode)"

outputs:
  output:
    type: csv
    required: true
    description: "Output CSV (may not be produced depending on failure mode)"

params:
  failure_mode:
    type: str
    required: true
    description: "'crash' raises an exception, 'missing_output' exits without writing output, 'succeed' behaves like transform"

executor: python
env: inherit
