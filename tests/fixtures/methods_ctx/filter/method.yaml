# Filter rows by numeric threshold (RunContext form).
inputs:
  data:
    type: csv
    required: true
    description: "Input CSV with a numeric 'value' column"
    columns:
      strict:
        - id
        - value

outputs:
  output:
    type: csv
    required: true
    description: "Rows where value >= threshold"
    columns:
      strict:
        - id
        - value

params:
  threshold:
    type: float
    required: false
    default: 10.0
    description: "Rows with value < threshold are dropped"
    constraints:
      min: 0
  drop_na:
    type: bool
    required: false
    default: true
    description: "Drop rows whose value is missing/non-numeric"

executor: python
env: inherit
