# Read the Docs build configuration for Workflow Canvas.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# The user-facing docs are two Sphinx sites built from committed MyST pages
# (rendered from docs/consumer/ by axiom-graph, which is a dev-only tool — RTD
# only needs to run Sphinx). The Sphinx config lives in userdocs/_sphinx/ while
# the source pages live in userdocs/guide/ and userdocs/reference/. Because the
# config dir and source dir differ, the native `sphinx:` key (which assumes
# srcdir == confdir) cannot be used; both sites are built explicitly. The Guide
# is served at the site root and the Reference under /reference/.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - pip install -r userdocs/requirements.txt
    - sphinx-build -c userdocs/_sphinx -b html userdocs/guide $READTHEDOCS_OUTPUT/html
    - sphinx-build -c userdocs/_sphinx -b html userdocs/reference $READTHEDOCS_OUTPUT/html/reference
