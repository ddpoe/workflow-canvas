# Read the Docs build configuration for Workflow Canvas.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# The user-facing docs are one Sphinx site built from committed MyST pages
# (rendered from docs/consumer/ by axiom-graph, which is a dev-only tool — RTD
# only needs to run Sphinx). The Sphinx config lives in userdocs/_sphinx/ while
# the source pages live in userdocs/guide/ (guide tracks + reference pages in
# one tree). Because the config dir and source dir differ, the native `sphinx:`
# key (which assumes srcdir == confdir) cannot be used; the site is built
# explicitly.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - pip install -r userdocs/requirements.txt
    - sphinx-build -c userdocs/_sphinx -b html userdocs/guide $READTHEDOCS_OUTPUT/html
